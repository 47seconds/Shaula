services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shaula
      POSTGRES_USER: shaula
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/DB/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
  
  datafeed:
    build:
      context: ./services/DataFeed
      dockerfile: Dockerfile
    container_name: datafeed
    environment:
      DATAFEED_PORT: ${DATAFEED_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DATAFEED_PORT}:${DATAFEED_PORT}"
    depends_on:
      - postgres

  strat:
    build:
      context: ./services/Strat
      dockerfile: Dockerfile
    container_name: strat
    environment:
      STRAT_PORT: ${STRAT_PORT}
    ports:
      - "${STRAT_PORT}:${STRAT_PORT}"
    depends_on:
      - postgres
      - datafeed

volumes:
  postgres_data:
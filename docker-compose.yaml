services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shaula
      POSTGRES_USER: shaula
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/DB/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  postgres_data: